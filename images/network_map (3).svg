<svg width="800" height="500" viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="neonMap">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="500" fill="#0b1115" />
  
  <!-- Map Outline (Abstract) -->
  <path d="M100 400 Q 200 350, 300 380 T 500 300 T 700 200" stroke="#1e3c5a" stroke-width="40" fill="none" stroke-linecap="round" opacity="0.3"/>
  
  <!-- Connections -->
  <g filter="url(#neonMap)">
    <line x1="150" y1="380" x2="350" y2="350" stroke="#00f2ff" stroke-width="3" />
    <line x1="350" y1="350" x2="450" y2="250" stroke="#00f2ff" stroke-width="3" />
    <line x1="450" y1="250" x2="650" y2="150" stroke="#00f2ff" stroke-width="3" />
    
    <!-- Nodes -->
    <circle cx="150" cy="380" r="8" fill="#0b1115" stroke="#00f2ff" stroke-width="3" />
    <circle cx="350" cy="350" r="6" fill="#0b1115" stroke="#00f2ff" stroke-width="3" />
    <circle cx="450" cy="250" r="8" fill="#0b1115" stroke="#00f2ff" stroke-width="3" />
    <circle cx="650" cy="150" r="10" fill="#ffffff" stroke="#00f2ff" stroke-width="4">
        <animate attributeName="r" values="10;12;10" dur="2s" repeatCount="indefinite" />
    </circle>
  </g>
  
  <!-- Labels -->
  <text x="150" y="410" fill="#ffffff" font-family="sans-serif" font-size="14" text-anchor="middle">OSAKA PRIME</text>
  <text x="350" y="380" fill="#ffffff" font-family="sans-serif" font-size="12" text-anchor="middle" opacity="0.7">NAGOYA</text>
  <text x="450" y="280" fill="#ffffff" font-family="sans-serif" font-size="14" text-anchor="middle">BAY DISTRICT</text>
  <text x="650" y="120" fill="#00f2ff" font-family="sans-serif" font-weight="bold" font-size="16" text-anchor="middle">NEO-TOKYO</text>
  
  <!-- UI Overlay -->
  <rect x="20" y="20" width="200" height="40" fill="rgba(0, 242, 255, 0.1)" rx="4" />
  <text x="40" y="45" fill="#00f2ff" font-family="monospace" font-size="12">ACTIVE ROUTES: 3</text>
  
</svg>
